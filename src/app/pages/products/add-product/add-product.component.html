<app-kt-app-form-page [title]="'Add Products'">
  <div class="row match-height">
    <!-- Basic Product Form -->
    <div class="col-12 mb-4">
      <div class="card">
        <div class="card-content">
          <div class="card-body">
            <form>
              <!-- Row 1: Product Name + Category -->
              <div class="form-row">
                <div class="col-md-6 col-12">
                  <div class="form-group mb-2">
                    <label for="name">Product Name</label>
                    <input
                      type="text"
                      id="name"
                      class="form-control"
                      [(ngModel)]="name"
                      name="name"
                      placeholder="Enter product name"
                      required
                    />
                  </div>
                </div>
                <div class="col-md-6 col-12">
                  <div class="form-group mb-2">
                    <label for="category_id">Category</label>
                    <select
                      id="category_id"
                      class="form-control"
                      [(ngModel)]="category_id"
                      name="category_id"
                      required
                    >
                      <option value="" disabled selected>Select a category</option>
                      <option *ngFor="let category of categories" [value]="category.value">
                        {{ category.label }}
                      </option>
                    </select>
                  </div>
                </div>
              </div>

              <!-- Row 2: Description + Status -->
              <div class="form-row">
                <div class="col-md-6 col-12">
                  <div class="form-group mb-2">
                    <label for="description">Description</label>
                    <input
                      type="text"
                      id="description"
                      class="form-control"
                      [(ngModel)]="description"
                      name="description"
                      placeholder="Enter description"
                      required
                    />
                  </div>
                </div>
                <div class="col-md-6 col-12">
                  <div class="form-group mb-2">
                    <label for="status">Status</label>
                    <select
                      id="status"
                      class="form-control"
                      [(ngModel)]="status"
                      name="status"
                      required
                    >
                      <option value="active">Active</option>
                      <option value="inactive">Inactive</option>
                    </select>
                  </div>
                </div>
              </div>

              <!-- Row 3: Price + Discount -->
              <div class="form-row">
                <div class="col-md-6 col-12">
                  <div class="form-group mb-2">
                    <label for="price">Price</label>
                    <input
                      type="number"
                      id="price"
                      class="form-control"
                      [(ngModel)]="price"
                      name="price"
                      placeholder="Set a regular price"
                    />
                  </div>
                </div>
                <div class="col-md-6 col-12">
                  <div class="form-group mb-2">
                    <label for="discount">Discount</label>
                    <input
                      type="number"
                      id="discount"
                      class="form-control"
                      [(ngModel)]="discount"
                      name="discount"
                      placeholder="Set a discount"
                    />
                  </div>
                </div>
              </div>

              <!-- Image Upload -->
              <div class="form-group mb-2">
                <label for="image">Upload Image</label>
                <input
                  type="file"
                  class="form-control-file"
                  id="image"
                  accept="image/*"
                  required
                />
              </div>
            </form>

            <hr />
            <h4 class="card-title">Product Attributes</h4>

            <div class="card-content">
              <div class="card-body p-0">
                <p>Here you can define product sizes, types, flavors and any options you have</p>

                <div class="form-row">
                  <div class="col-md-12 col-12">
                    <div class="form-group mb-2">
                      <!-- Input + Button Row -->
                      <div class="d-flex align-items-start gap-2 mb-3 flex-wrap">
                        <input
                          [(ngModel)]="addAttributeInput"
                          (input)="onInputChange(addAttributeInput)"
                          type="text"
                          placeholder="Variation Type (e.g., Size, Toppings)"
                          class="form-control"
                          style="max-width: 300px"
                        />

                        <button
                          type="button"
                          (click)="addAttributes()"
                          class="btn btn-primary"
                          style="white-space: nowrap"
                        >
                          Add Attributes
                        </button>
                      </div>

                      <!-- Autocomplete Suggestions -->
                      <div
                        class="autocomplete-container mb-3"
                        style="
                          display: flex;
                          overflow-x: auto;
                          flex-wrap: wrap;
                          padding: 5px;
                          border-radius: 5px;
                          background-color: #f9f9f9;
                          gap: 8px;
                        "
                        *ngIf="filteredSuggestions?.length > 0"
                      >
                        <div
                          *ngFor="let suggestion of filteredSuggestions"
                          (click)="selectSuggestion(suggestion)"
                          class="chip"
                          style="
                            cursor: pointer;
                            padding: 5px 12px;
                            background-color: #e0e0e0;
                            border-radius: 16px;
                            white-space: nowrap;
                            font-size: 0.9rem;
                          "
                        >
                          {{ suggestion.name }}
                        </div>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            </div>
            <hr />
            <h4 class="card-title">Product Variations</h4>
            <div class="card-content">
              <div class="card-body p-0">
                <p>Select any attributes and update its variations</p>

                <!-- Badges Section -->
                <div class="form-group mb-4">
                  <div class="d-flex flex-row flex-wrap justify-content-start gap-2">
                    <div
                      class="badge badge-secondary fw-bold px-4 py-2"
                      [class.badge-info]="item?.selected"
                      style="cursor: pointer"
                      *ngFor="let item of variations"
                      (click)="selectAttribute(item?.type)"
                    >
                      {{ item?.type }}
                    </div>
                  </div>
                </div>

                <!-- Variations Table -->
                <div class="form-group">
                  <table class="table table-bordered">
                    <thead>
                      <tr>
                        <th>Variation Type</th>
                        <th>Option Name</th>
                        <th>Description</th>
                        <th>Additional Price</th>
                        <th>Actions</th>
                      </tr>
                    </thead>
                    <tbody>
                      <tr *ngFor="let variation of variations | filterSelected: 'selected' : true; let i = index">
                        <td style="vertical-align: top !important">
                          <input
                            type="text"
                            [(ngModel)]="variation.type"
                            placeholder="Variation Type (e.g., Size, Toppings)"
                            class="form-control"
                          />
                        </td>
                        <td>
                          <div *ngFor="let option of variation.options; let j = index" class="mb-2">
                            <input
                              type="text"
                              [(ngModel)]="option.name"
                              placeholder="Option Name (e.g., Small)"
                              class="form-control mb-1"
                            />
                          </div>
                        </td>
                        <td>
                          <div *ngFor="let option of variation.options; let j = index" class="mb-2">
                            <input
                              type="text"
                              [(ngModel)]="option.description"
                              placeholder="Description"
                              class="form-control mb-1"
                            />
                          </div>
                        </td>
                        <td>
                          <div *ngFor="let option of variation.options">
                            <input
                              type="number"
                              [(ngModel)]="option.price"
                              placeholder="Additional Price (e.g., 5)"
                              class="form-control mb-1"
                            />
                          </div>
                        </td>
                        <td>
                          <i
                            class="ti ti-trash"
                            style="font-size: 26px; cursor: pointer;"
                            (click)="removeOption(i, i)"
                          ></i>
                        </td>
                      </tr>
                    </tbody>
                  </table>
                </div>

                <!-- Action Buttons -->
                <div class="form-row mt-3">
                  <div class="col-md-6 col-12">
                    <button
                      type="button"
                      class="btn btn-primary"
                      (click)="addItemINVariation()"
                    >
                      Add Variations
                    </button>
                  </div>

                </div>

              </div>
            </div>
          </div>
        </div>
      </div>
      <div class=" text-right">
        <button
          type="submit"
          class="btn btn-primary"
          (click)="onSubmit()">
          Submit
        </button>
      </div>

    </div>

    <!-- Product Variations Section -->




  </div>
</app-kt-app-form-page>
