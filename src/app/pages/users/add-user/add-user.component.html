<app-kt-app-form-page [title]="'Add User'">
  <form (ngSubmit)="onSubmit()">
    <div class="col-12 mb-4">
      <div class="card">
        <div class="card-header">
          <h4 class="card-title">User Details</h4>
        </div>
        <div class="card-content">
          <div class="card-body">
            <p class="mb-3">Manage user information and settings</p>
  
            <!-- Row 1: Name + Email -->
            <div class="form-row">
              <div class="col-md-6 col-12">
                <div class="form-group mb-3">
                  <label class="form-label">Name</label>
                  <input type="text" class="form-control" [(ngModel)]="name" name="name" 
                         placeholder="Enter user name" required>
                </div>
              </div>
              <div class="col-md-6 col-12">
                <div class="form-group mb-3">
                  <label class="form-label">Email Address</label>
                  <input type="email" class="form-control" [(ngModel)]="email" name="email" 
                         placeholder="Enter email" required>
                </div>
              </div>
            </div>
  
            <!-- Row 2: Password + Address -->
            <div class="form-row">
              <div class="col-md-6 col-12">
                <div class="form-group mb-3">
                  <label class="form-label">Password</label>
                  <input type="password" class="form-control" [(ngModel)]="password" name="password" 
                         placeholder="Enter password" minlength="6">
                </div>
              </div>
              <div class="col-md-6 col-12">
                <div class="form-group mb-3">
                  <label class="form-label">Address</label>
                  <input type="text" class="form-control" [(ngModel)]="address" name="address" 
                         placeholder="Enter address" required>
                </div>
              </div>
            </div>
  
            <!-- Row 3: Phone + Role -->
            <div class="form-row">
              <div class="col-md-6 col-12">
                <div class="form-group mb-3">
                  <label class="form-label">Phone Number</label>
                  <input type="tel" class="form-control" [(ngModel)]="phone" name="phone" 
                         placeholder="XXX-XXX-XXXX">
                </div>
              </div>
              <div class="col-md-6 col-12">
                <div class="form-group mb-3">
                  <label class="form-label">Role</label>
                  <select class="form-control" [(ngModel)]="role_id" name="role_id" required>
                    <option value="" disabled selected>Select a role</option>
                    <option *ngFor="let role of roles" [value]="role.value">{{role.label}}</option>
                  </select>
                </div>
              </div>
            </div>
  
            <!-- Row 4: Status + City -->
            <div class="form-row">
              <div class="col-md-6 col-12">
                <div class="form-group mb-3">
                  <label class="form-label">Status</label>
                  <select class="form-control" [(ngModel)]="status" name="status" required>
                    <option value="active">Active</option>
                    <option value="inactive">Inactive</option>
                  </select>
                </div>
              </div>
              <div class="col-md-6 col-12">
                <div class="form-group mb-3">
                  <label class="form-label">City</label>
                  <input type="text" class="form-control" [(ngModel)]="city" name="city" 
                         placeholder="Enter city">
                </div>
              </div>
            </div>
  
            <!-- Row 5: State + Country -->
            <div class="form-row">
              <div class="col-md-6 col-12">
                <div class="form-group mb-3">
                  <label class="form-label">State</label>
                  <input type="text" class="form-control" [(ngModel)]="state" name="state" 
                         placeholder="Enter state">
                </div>
              </div>
              <div class="col-md-6 col-12">
                <div class="form-group mb-3">
                  <label class="form-label">Country</label>
                  <input type="text" class="form-control" [(ngModel)]="country" name="country" 
                         placeholder="Enter country">
                </div>
              </div>
            </div>
  
            <!-- Row 6: Image Upload -->
            <div class="form-row">
              <div class="col-md-6 col-12">
                <div class="form-group mb-3">
                  <label class="form-label">Profile Image</label>
                  <input type="file" class="form-control" 
                  [(ngModel)]="image"
                         (change)="onFileChange($event)" accept="image/*">
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  
    <div class="col-12 text-right mt-3">
      <button type="submit" class="btn btn-primary px-4">Submit</button>
    </div>
  </form>
</app-kt-app-form-page>
